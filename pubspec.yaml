name: goodtoograb
description: "A professional food rescue app project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.7
  get_it: ^8.0.0
  dartz: ^0.10.1
  google_fonts: ^7.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.0.0
  path_provider: ^2.1.5
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
